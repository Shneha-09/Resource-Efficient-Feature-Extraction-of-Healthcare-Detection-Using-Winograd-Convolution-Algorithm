<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Disease Detection App</title>
    <!-- Use Flask's url_for to load CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      /* Make navbar fixed at top without changing your existing styles */
      header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(
          0,
          0,
          0,
          0.85
        ); /* semi-transparent to match your design */
      }

      /* Ensure content below header is not hidden */
      body {
        padding-top: 150px; /* adjust based on header height */
      }

      /* Optional: scroll-padding for anchor links */
      html {
        scroll-padding-top: 150px;
      }
      .center-img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        /* Optional: ensure image is responsive and doesn't overflow */
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1 class="welcome-heading">
        ECG Based Heart Attack Classification Using Winogard
      </h1>
      <nav>
        <ul class="navbar">
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('pred') }}">Prediction</a></li>
          <li><a href="{{ url_for('perf') }}">Performance</a></li>
          <li><a href="{{ url_for('chart') }}">Chart</a></li>
          <li>
            <a
              href="{{ url_for('logout') }}"
              style="color: #e7508f; font-weight: bold"
              >Sign Out</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <!-- Home Section -->
    <section id="home">
      <h2>Distribution of Target Class</h2>

      <div>
        <img
          src="static/FClasscountbar.png"
          alt="This is my image."
          height="400px"
          width="600px"
          class="center-img"
        />
      </div>
      <br />
      <div>
        <img
          src="static/Fclassdistpie.png"
          alt="This is my image."
          height="400px"
          width="600px"
          class="center-img"
        />
      </div>
    </section>

    <!-- JS for smooth scroll and cards -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const links = document.querySelectorAll('a[href^="#"]');
        links.forEach((link) => {
          link.addEventListener("click", function (e) {
            const targetId = this.getAttribute("href");
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
              e.preventDefault();
              targetElement.scrollIntoView({ behavior: "smooth" });
            }
          });
        });

        // Make all cards toggleable
        const cards = document.querySelectorAll(".card");
        cards.forEach((card) => {
          card.addEventListener("click", () => {
            card.classList.toggle("open");
          });
        });
      });
    </script>
  </body>
</html>
